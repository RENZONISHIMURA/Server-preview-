<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Server Preview Generator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Preview Container */
.preview {
    width: 600px;
    height: 300px;
    position: relative;
    background: #1e293b;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* Banner */
.banner {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* Icon */
.icon {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    position: absolute;
    bottom: 20px;
    left: 30px;
    border: 6px solid #0f172a;
    object-fit: cover;
    background: #111;
}

/* Button */
button {
    position: absolute;
    bottom: 20px;
    right: 30px;
    padding: 10px 20px;
    background: #5865F2;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #4752c4;
}
</style>
</head>

<body>

<div class="preview" id="preview">
    <img id="banner" class="banner" src="" alt="Banner">
    <img id="icon" class="icon" src="" alt="Icon">
    <button onclick="downloadImage()">Download .bin</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let inviteRaw = params.toString();

if (!inviteRaw) {
    alert("No invite provided.");
}

let inviteCode = inviteRaw.replace("https://discord.gg/", "")
                           .replace("discord.gg/", "")
                           .replace("https://discord.com/invite/", "");

fetch(`https://discord.com/api/v10/invites/${inviteCode}?with_counts=true`)
.then(res => res.json())
.then(data => {

    if (!data.guild) {
        alert("Invalid Invite");
        return;
    }

    const guild = data.guild;

    const iconUrl = `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=512`;
    const bannerUrl = guild.banner
        ? `https://cdn.discordapp.com/banners/${guild.id}/${guild.banner}.png?size=1024`
        : "https://images.unsplash.com/photo-1519681393784-d120267933ba";

    document.getElementById("icon").src = iconUrl;
    document.getElementById("banner").src = bannerUrl;

})
.catch(err => {
    console.error(err);
    alert("Error fetching invite data. CORS may block this.");
});


function downloadImage() {

    html2canvas(document.getElementById("preview")).then(canvas => {
        const link = document.createElement("a");
        link.download = "server-preview.bin";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });

}
</script>

<!-- html2canvas CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
