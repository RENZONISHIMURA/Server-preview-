<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Server Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body {
    margin: 0;
    background: transparent;
}
.preview {
    width: 600px;
    height: 300px;
    position: relative;
    background: #1e293b;
    border-radius: 20px;
    overflow: hidden;
}
.banner {
    width: 100%;
    height: 180px;
    object-fit: cover;
}
.icon {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    position: absolute;
    bottom: 20px;
    left: 30px;
    border: 6px solid #0f172a;
    object-fit: cover;
    background: #111;
}
</style>
</head>
<body>

<div class="preview" id="preview">
    <img id="banner" class="banner">
    <img id="icon" class="icon">
</div>

<script>
const params = new URLSearchParams(window.location.search);
const inviteUrl = params.get("invite");

if (!inviteUrl) {
    document.body.innerHTML = "No invite provided";
    throw new Error("No invite");
}

// Clean invite code
let inviteCode = inviteUrl
    .replace("https://discord.gg/", "")
    .replace("http://discord.gg/", "")
    .replace("https://discord.com/invite/", "")
    .replace("discord.gg/", "");

// CORS proxy (temporary solution)
fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(
    `https://discord.com/api/v10/invites/${inviteCode}?with_counts=true`
)}`)
.then(res => res.json())
.then(data => {

    if (!data.guild) {
        document.body.innerHTML = "Invalid Invite";
        return;
    }

    const guild = data.guild;

    const iconUrl = `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=512`;
    const bannerUrl = guild.banner
        ? `https://cdn.discordapp.com/banners/${guild.id}/${guild.banner}.png?size=1024`
        : "https://picsum.photos/800/300";

    document.getElementById("icon").src = iconUrl;
    document.getElementById("banner").src = bannerUrl;

    // Wait for images to load then auto-render as image
    Promise.all([
        document.getElementById("icon").decode(),
        document.getElementById("banner").decode()
    ]).then(() => {

        html2canvas(document.getElementById("preview")).then(canvas => {

            // Replace whole page with just the image
            document.body.innerHTML = "";
            document.body.appendChild(canvas);

        });

    });

})
.catch(err => {
    console.error(err);
    document.body.innerHTML = "Error fetching invite data";
});
</script>

</body>
</html>
